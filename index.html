<!doctype html>
<html lang="en" data-lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Sathu | Thai temples, culture and reflections</title>
    <meta
      name="description"
      content="Discover Thai temples, daily wisdom, and Boon in one calm, beautifully designed app."
    />
    <meta
      name="theme-color"
      content="#221C10"
    />
    <link rel="icon" type="image/png" href="./assets/images/master_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Marcellus&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-aura aura-1" aria-hidden="true"></div>
    <div class="page-aura aura-2" aria-hidden="true"></div>
    <div class="page-noise" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="#top" aria-label="Sathu home">
          <span class="brand-mark">
            <img src="./assets/images/master_icon.png" alt="" />
          </span>

          <span class="brand-copy">
            <span class="brand-name">Sathu</span>
            <span class="brand-tag" data-i18n="brand.tag"></span>
          </span>
        </a>

        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#features" data-i18n="nav.features"></a>
          <a href="#boon" data-i18n="nav.boon"></a>
          <a href="#download" data-i18n="nav.download"></a>
          <a
            href="https://kapsdevelopment.com/sathu/support/"
            target="_blank"
            rel="noreferrer"
            data-i18n="nav.support"
          ></a>
        </nav>

        <div class="lang-switch" aria-label="Language switcher">
          <button class="lang-btn" type="button" data-lang="en">EN</button>
          <button class="lang-btn" type="button" data-lang="th">ไทย</button>
        </div>
      </div>
    </header>

    <main class="page" id="top">
      <section class="hero section">
        <div class="container hero-grid">
          <div class="hero-copy reveal">
            <div class="eyebrow" data-i18n="hero.eyebrow"></div>
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-lead" data-i18n="hero.lead"></p>
            <p class="hero-body" data-i18n="hero.body"></p>

            <div class="hero-actions">
              <a
                class="button button-store"
                href="https://apps.apple.com/us/app/sathu/id6757160902"
                target="_blank"
                rel="noreferrer"
                data-i18n="cta.appStore"
              ></a>
              <a
                class="button button-store"
                href="https://play.google.com/store/apps/details?id=com.kapsdevelopment.thaitemples&pcampaignid=web_share"
                target="_blank"
                rel="noreferrer"
                data-i18n="cta.googlePlay"
              ></a>
            </div>

            <p class="hero-note" data-i18n="hero.note"></p>

            <div class="hero-pills">
              <span class="info-pill" data-i18n="hero.pill.discovery"></span>
              <span class="info-pill" data-i18n="hero.pill.wisdom"></span>
              <span class="info-pill" data-i18n="hero.pill.boon"></span>
              <span class="info-pill" data-i18n="hero.pill.language"></span>
            </div>
          </div>

          <div class="hero-stage reveal">
            <div class="hero-orbit" aria-hidden="true"></div>

            <div class="monk-halo">
              <video
                class="monk-video"
                autoplay
                muted
                loop
                playsinline
              >
                <source src="./assets/video/wei_child_monk_animated.mp4" type="video/mp4" />
              </video>
            </div>

            <article class="hero-insight card-surface">
              <span class="card-label" data-i18n="hero.card.label"></span>
              <h2 data-i18n="hero.card.title"></h2>
              <p data-i18n="hero.card.body"></p>
            </article>

            <div class="phone phone-primary">
              <div class="phone-shell">
                <img
                  src="./assets/images/sathu_app_screenshot_3.jpeg"
                  alt="Sathu temple detail view"
                  data-i18n-attr="alt:assets.templeAlt"
                  loading="eager"
                />
              </div>
            </div>

            <div class="phone phone-secondary">
              <div class="phone-shell">
                <img
                  src="./assets/images/sathu_app_screenshot_4.png"
                  alt="Boon chat inside Sathu"
                  data-i18n-attr="alt:assets.boonAlt"
                  loading="lazy"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section" id="features">
        <div class="container">
          <div class="section-head reveal">
            <div class="eyebrow" data-i18n="features.eyebrow"></div>
            <h2 data-i18n="features.title"></h2>
            <p data-i18n="features.lead"></p>
          </div>

          <div class="feature-grid">
            <article class="feature-card feature-card-wide reveal">
              <div class="feature-copy">
                <span class="feature-kicker" data-i18n="features.temples.kicker"></span>
                <h3 data-i18n="features.temples.title"></h3>
                <p data-i18n="features.temples.body"></p>
              </div>

              <div class="feature-preview">
                <div class="preview-frame">
                  <img
                    src="./assets/images/sathu_app_screenshot_3.jpeg"
                    alt="Temple discovery in Sathu"
                    data-i18n-attr="alt:assets.templeAlt"
                    loading="lazy"
                  />
                </div>
              </div>
            </article>

            <article class="feature-card reveal">
              <span class="feature-kicker" data-i18n="features.culture.kicker"></span>
              <h3 data-i18n="features.culture.title"></h3>
              <p data-i18n="features.culture.body"></p>
            </article>

            <article class="feature-card reveal">
              <span class="feature-kicker" data-i18n="features.daily.kicker"></span>
              <h3 data-i18n="features.daily.title"></h3>
              <p data-i18n="features.daily.body"></p>
            </article>

            <article class="feature-card reveal">
              <span class="feature-kicker" data-i18n="features.language.kicker"></span>
              <h3 data-i18n="features.language.title"></h3>
              <p data-i18n="features.language.body"></p>
            </article>

            <article class="feature-card reveal">
              <span class="feature-kicker" data-i18n="features.maps.kicker"></span>
              <h3 data-i18n="features.maps.title"></h3>
              <p data-i18n="features.maps.body"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section" id="boon">
        <div class="container">
          <div class="boon-panel card-surface reveal">
            <div class="boon-art">
              <div class="boon-ring" aria-hidden="true"></div>
              <img
                class="boon-avatar"
                src="./assets/images/boon_avatar_no_bg.png"
                alt="Boon avatar"
                data-i18n-attr="alt:assets.boonAvatarAlt"
                loading="lazy"
              />
            </div>

            <div class="boon-copy">
              <div class="eyebrow" data-i18n="boon.eyebrow"></div>
              <h2 data-i18n="boon.title"></h2>
              <p data-i18n="boon.body1"></p>
              <p data-i18n="boon.body2"></p>

              <div class="boon-chips">
                <span class="info-pill" data-i18n="boon.chip1"></span>
                <span class="info-pill" data-i18n="boon.chip2"></span>
                <span class="info-pill" data-i18n="boon.chip3"></span>
              </div>

              <blockquote class="boon-quote">
                <span class="quote-mark">“</span>
                <p data-i18n="boon.quote"></p>
              </blockquote>
            </div>

            <div class="boon-preview">
              <div class="preview-frame preview-frame-chat">
                <img
                  src="./assets/images/sathu_app_screenshot_4.png"
                  alt="Boon chat preview"
                  data-i18n-attr="alt:assets.boonAlt"
                  loading="lazy"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="section-head reveal">
            <div class="eyebrow" data-i18n="audience.eyebrow"></div>
            <h2 data-i18n="audience.title"></h2>
            <p data-i18n="audience.lead"></p>
          </div>

          <div class="audience-grid">
            <article class="audience-card reveal">
              <h3 data-i18n="audience.travel.title"></h3>
              <p data-i18n="audience.travel.body"></p>
            </article>

            <article class="audience-card reveal">
              <h3 data-i18n="audience.learn.title"></h3>
              <p data-i18n="audience.learn.body"></p>
            </article>

            <article class="audience-card reveal">
              <h3 data-i18n="audience.reflect.title"></h3>
              <p data-i18n="audience.reflect.body"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="section" id="download">
        <div class="container">
          <div class="download-panel reveal">
            <div class="download-copy">
              <div class="eyebrow" data-i18n="download.eyebrow"></div>
              <h2 data-i18n="download.title"></h2>
              <p data-i18n="download.body"></p>
            </div>

            <div class="download-actions">
              <a
                class="button button-store"
                href="https://apps.apple.com/us/app/sathu/id6757160902"
                target="_blank"
                rel="noreferrer"
                data-i18n="cta.appStore"
              ></a>
              <a
                class="button button-store"
                href="https://play.google.com/store/apps/details?id=com.kapsdevelopment.thaitemples&pcampaignid=web_share"
                target="_blank"
                rel="noreferrer"
                data-i18n="cta.googlePlay"
              ></a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <p class="footer-note" data-i18n="footer.note"></p>
          <p class="footer-disclaimer" data-i18n="footer.disclaimer"></p>
        </div>

        <div class="footer-links">
          <a href="https://kapsdevelopment.com/sathu/support/" target="_blank" rel="noreferrer" data-i18n="footer.support"></a>
          <a href="https://kapsdevelopment.com/sathu/privacy/" target="_blank" rel="noreferrer" data-i18n="footer.privacy"></a>
          <a href="https://kapsdevelopment.com/sathu/terms/" target="_blank" rel="noreferrer" data-i18n="footer.terms"></a>
        </div>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
